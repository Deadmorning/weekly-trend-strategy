<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DTS参数优化 — 日线换仓频率</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--blue:#58a6ff;--orange:#ffa657;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:14px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--muted)}

.layout{display:grid;grid-template-columns:232px 1fr;height:calc(100vh - 44px)}
.side{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.main{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}

/* sidebar */
.sc{padding:9px 12px;cursor:pointer;border-left:3px solid transparent;
  border-bottom:1px solid rgba(48,54,61,.4);transition:.1s}
.sc:hover{background:var(--bg3)}
.sc.on{background:var(--bg3);border-left-color:var(--blue)}
.sn{font-size:12px;font-weight:700;margin-bottom:4px}
.stag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:10px}
.si{background:var(--bg3);border-radius:3px;padding:2px 5px}
.sl{font-size:8px;color:var(--muted)}
.sv{font-weight:700}

/* summary strip */
.summary{display:flex;gap:6px;flex-wrap:wrap}
.kc{flex:1;min-width:120px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;padding:8px 11px}
.kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kv{font-size:16px;font-weight:700;margin-top:2px}
.ks{font-size:9px;color:var(--muted);margin-top:1px}

/* amp section */
.amp-bar{display:flex;gap:6px;align-items:center;padding:8px 12px;
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:11px}
.amp-label{color:var(--muted);font-size:10px}
.amp-val{font-weight:700;color:var(--orange)}

/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px}
.ct{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}

#c-heatmap{width:100%;height:300px}
#c-compare{width:100%;height:220px}
#c-trades{width:100%;height:180px}
#c-alpha-path{width:100%;height:200px}

/* top10 table */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--bg3);padding:5px 8px;text-align:left;
  color:var(--muted);font-size:8px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.tbl td{padding:4px 8px;border-bottom:1px solid rgba(48,54,61,.35)}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr.best-row td{background:rgba(88,166,255,.07);border-color:rgba(88,166,255,.2)}

/* utils */
.g{color:var(--green)}.r{color:var(--red)}.m{color:var(--muted)}.b{color:var(--blue)}.o{color:var(--orange)}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.bc{background:rgba(139,148,158,.15);color:var(--muted);border:1px solid var(--border)}
.bo{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.25)}
.warn{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);
  padding:7px 11px;border-radius:5px;font-size:10px;color:var(--yellow)}
</style>
</head>

<div class="hdr">

}, {"same": 3.0, "rev": 0.3, "alpha": -67.659, "n_trades": 65, "sharpe": -0.242}, {"same": 3.0, "rev": 0.45, "alpha": -76.701, "n_trades": 53, "sharpe": -0.457}, {"same": 3.0, "rev": 0.6, "alpha": -78.473, "n_trades": 48, "sharpe": -0.505}, {"same": 3.0, "rev": 0.75, "alpha": -42.935, "n_trades": 40, "sharpe": 0.193}, {"same": 3.0, "rev": 1.0, "alpha": -46.056, "n_trades": 29, "sharpe": 0.141}, {"same": 3.0, "rev": 1.25, "alpha": -50.823, "n_trades": 19, "sharpe": 0.056}, {"same": 3.0, "rev": 1.5, "alpha": -50.752, "n_trades": 19, "sharpe": 0.056}, {"same": 3.0, "rev": 2.0, "alpha": -51.573, "n_trades": 17, "sharpe": 0.042}, {"same": 3.5, "rev": 0.15, "alpha": -91.24, "n_trades": 87, "sharpe": -0.796}, {"same": 3.5, "rev": 0.3, "alpha": -67.659, "n_trades": 65, "sharpe": -0.242}, {"same": 3.5, "rev": 0.45, "alpha": -76.39, "n_trades": 52, "sharpe": -0.45}, {"same": 3.5, "rev": 0.6, "alpha": -78.169, "n_trades": 47, "sharpe": -0.498}, {"same": 3.5, "rev": 0.75, "alpha": -42.476, "n_trades": 39, "sharpe": 0.2}, {"same": 3.5, "rev": 1.0, "alpha": -45.611, "n_trades": 28, "sharpe": 0.149}, {"same": 3.5, "rev": 1.25, "alpha": -50.398, "n_trades": 18, "sharpe": 0.064}, {"same": 3.5, "rev": 1.5, "alpha": -50.328, "n_trades": 18, "sharpe": 0.064}, {"same": 3.5, "rev": 2.0, "alpha": -51.152, "n_trades": 16, "sharpe": 0.049}, {"same": 4.0, "rev": 0.15, "alpha": -91.24, "n_trades": 87, "sharpe": -0.796}, {"same": 4.0, "rev": 0.3, "alpha": -67.659, "n_trades": 65, "sharpe": -0.242}, {"same": 4.0, "rev": 0.45, "alpha": -74.567, "n_trades": 51, "sharpe": -0.409}, {"same": 4.0, "rev": 0.6, "alpha": -78.169, "n_trades": 47, "sharpe": -0.498}, {"same": 4.0, "rev": 0.75, "alpha": -42.476, "n_trades": 39, "sharpe": 0.2}, {"same": 4.0, "rev": 1.0, "alpha": -38.237, "n_trades": 27, "sharpe": 0.267}, {"same": 4.0, "rev": 1.25, "alpha": -43.367, "n_trades": 17, "sharpe": 0.185}, {"same": 4.0, "rev": 1.5, "alpha": -43.291, "n_trades": 17, "sharpe": 0.186}, {"same": 4.0, "rev": 2.0, "alpha" const NS = Object.keys(D);
let cur = NS[0];
const C = {}, $ = id=>document.getElementById(id);
const gc = id => { if(!C[id]) C[id]=echarts.init($(id),'dark'); return C[id]; };
const p2 = v=>(v>=0?'+':'')+Number(v).toFixed(2)+'%';
const cc = v=>v>0?'g':v<0?'r':'';

function renderSide(){
  $('side').innerHTML = NS.map(n=>{
    const d=D[n], b=d.best, bl=d.baseline;
    const imp=b.alpha-bl.alpha, pos=imp>0;
    return `<div class="sc ${n===cur?'on':''}" onclick="sel('${n}')">
      <div class="sn">${n}
        <span class="stag" style="background:${pos?'rgba(63,185,80,.2)':'rgba(248,81,73,.15)'};color:${pos?'var(--green)':'var(--red)'}">${pos?'可改善':'待研究'}</span>
      </div>
      <div class="sg">
        <div class="si"><div class="sl">基准α</div><div class="sv ${cc(bl.alpha)}">${p2(bl.alpha)}</div></div>
        <div class="si"><div class="sl">最优α</div><div class="sv ${cc(b.alpha)}">${p2(b.alpha)}</div></div>
        <div class="si"><div class="sl">改善幅度</div><div class="sv ${pos?'g':'r'}">${p2(imp)}</div></div>
        <div class="si"><div class="sl">交易笔↓</div><div class="sv b">${bl.n_trades}→${Math.round(b.n_trades)}</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderMain(n){
  const d=D[n], b=d.best, bl=d.baseline, amp=d.amp_stats;
  const bnh=d.bnh_r, imp=b.alpha-bl.alpha;

  $('main-content').innerHTML = `
    <div class="warn">
      ⚠ 以下参数均为样本内（In-Sample）优化结果，存在过拟合风险。当前数据仅3年，
      建议将结果视为"参数量纲参考"，而非直接用于实盘。需Walk-Forward验证。
    </div>
    <div class="amp-bar">
      <span class="amp-label">${n} 日线振幅分布：</span>
      <span>均值 <b class="amp-val">${amp.mean}%</b></span>
      <span>中位数 <b class="amp-val">${amp.median}%</b></span>
      <span>25% <b class="amp-val">${amp.q25}%</b></span>
      <span>75% <b class="amp-val">${amp.q75}%</b></span>
      <span style="color:var(--muted);margin-left:8px;font-size:10px">
        → 原SAME=0.30% ≈ 均值的${(0.30/amp.mean*100).toFixed(0)}%，过滤门槛太低
      </span>
    </div>
    <div class="summary">
      <div class="kc" style="border-color:var(--border)">
        <div class="kl">BNH（基准）</div>
        <div class="kv ${cc(bnh)}">${p2(bnh)}</div>
        <div class="ks">买入持有 3年总收益</div>
      </div>
      <div class="kc" style="border-color:rgba(139,148,158,.3)">
        <div class="kl">基准参数（0.30/0.15）</div>
        <div class="kv ${cc(bl.alpha)}">${p2(bl.alpha)}</div>
        <div class="ks">超额α · ${bl.n_trades}笔 · 夏普${bl.sharpe} · 回撤${bl.mdd}%</div>
      </div>
      <div class="kc" style="border-color:var(--blue)">
        <div class="kl" style="color:var(--blue)">最优参数（${b.same}/${b.rev}）</div>
        <div class="kv ${cc(b.alpha)}">${p2(b.alpha)}</div>
        <div class="ks">超额α · ${Math.round(b.n_trades)}笔 · 夏普${b.sharpe.toFixed(2)} · 回撤${b.mdd.toFixed(1)}%</div>
      </div>
      <div class="kc" style="border-color:${imp>0?'rgba(63,185,80,.3)':'rgba(248,81,73,.3)'}">
        <div class="kl">α改善幅度</div>
        <div class="kv ${cc(imp)}">${p2(imp)}</div>
        <div class="ks">交易笔数 ${bl.n_trades} → ${Math.round(b.n_trades)} (↓${Math.round((1-b.n_trades/bl.n_trades)*100)}%)</div>
      </div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">SAME × REV 参数热力图（α值）— 颜色越深绿越好</div><div id="c-heatmap"></div></div>
      <div>
        <div class="card" style="margin-bottom:8px"><div class="ct">基准 vs 最优参数全指标对比</div><div id="c-compare"></div></div>
        <div class="card"><div class="ct">交易笔数随SAME阈值变化（REV=最优）</div><div id="c-trades"></div></div>
      </div>
    </div>
    <div class="card"><div class="ct">α随SAME参数变化路径（固定REV=${b.rev}%）</div><div id="c-alpha-path"></div></div>
    <div class="card">
      <div class="ct">Top 10 参数组合</div>
      <table class="tbl">
        <thead><tr><th>#</th><th>SAME(%)</th><th>REV(%)</th><th>超额α</th>
          <th>总收益</th><th>交易笔</th><th>夏普</th><th>最大回撤</th><th>持多%</th><th>备注</th></tr></thead>
        <tbody id="top10-body"></tbody>
      </table>
    </div>
  `;

  // 热力图
  const grid=d.grid;
  const sameVals=[...new Set(grid.map(r=>r.same))].sort((a,b)=>a-b);
  const revVals =[...new Set(grid.map(r=>r.rev ))].sort((a,b)=>a-b);
  const hmData=[];
  grid.forEach(r=>{
    const xi=sameVals.indexOf(r.same), yi=revVals.indexOf(r.rev);
    if(xi>=0&&yi>=0) hmData.push([xi,yi,r.alpha]);
  });
  const alphaMin=Math.min(...hmData.map(v=>v[2]));
  const alphaMax=Math.max(...hmData.map(v=>v[2]));

  gc('c-heatmap').setOption({
    backgroundColor:'transparent',
    tooltip:{formatter:p=>`SAME=${sameVals[p.data[0]]}% REV=${revVals[p.data[1]]}%<br>α=${p.data[2].toFixed(2)}%`},
    grid:{top:10,bottom:40,left:46,right:80},
    xAxis:{type:'category',data:sameVals.map(v=>v+'%'),
      axisLabel:{color:'#8b949e',fontSize:9},name:'SAME',nameTextStyle:{color:'#8b949e',fontSize:9}},
    yAxis:{type:'category',data:revVals.map(v=>v+'%'),
      axisLabel:{color:'#8b949e',fontSize:9},name:'REV',nameTextStyle:{color:'#8b949e',fontSize:9}},
    visualMap:{min:alphaMin,max:alphaMax,calculable:true,
      inRange:{color:['#f85149','#21262d','#3fb950']},
      textStyle:{color:'#8b949e',fontSize:9},right:0,top:'center',itemHeight:180},
    series:[{type:'heatmap',data:hmData,
      markPoint:{data:[{
        coord:[sameVals.indexOf(b.same), revVals.indexOf(b.rev)],
        symbol:'pin',symbolSize:18,itemStyle:{color:'#ffa657'}
      }]},
      emphasis:{itemStyle:{borderColor:'#fff',borderWidth:1}}}]
  },true);

  // 对比柱图
  const metrics=['总收益','超额α','夏普','回撤','持多%'];
  const blVals=[bl.total_r, bl.alpha, bl.sharpe*10, bl.mdd, bl.long_pct];
  const bsVals=[b.total_r,  b.alpha,  b.sharpe*10,  b.mdd,  b.long_pct];
  gc('c-compare').setOption({
    backgroundColor:'transparent',
    tooltip:{},
    legend:{bottom:0,textStyle:{color:'#8b949e',fontSize:9}},
    grid:{top:6,bottom:32,left:50,right:8},
    xAxis:{type:'category',data:metrics,axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:8}},
    series:[
      {name:'基准(0.30/0.15)',type:'bar',data:blVals,barMaxWidth:18,itemStyle:{color:'#8b949e'}},
      {name:'最优参数',       type:'bar',data:bsVals,barMaxWidth:18,itemStyle:{color:'#58a6ff'}},
    ]
  },true);

  // trades vs SAME chart（固定最优REV）
  const bestRev=b.rev;
  const trPath=grid.filter(r=>Math.abs(r.rev-bestRev)<0.001).sort((a,b2)=>a.same-b2.same);
  gc('c-trades').setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    grid:{top:6,bottom:28,left:36,right:36},
    xAxis:{type:'category',data:trPath.map(r=>r.same+'%'),axisLabel:{color:'#8b949e',fontSize:8}},
    yAxis:[
      {name:'交易笔数',splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:8}},
    ],
    series:[{name:'交易笔数',type:'bar',data:trPath.map(r=>r.n_trades),
      barMaxWidth:14,itemStyle:{color(p){
        const same=trPath[p.dataIndex].same;
        return Math.abs(same-b.same)<0.001?'#ffa657':'#30363d';
      }}}]
  },true);

  // alpha path
  const apPath=grid.filter(r=>Math.abs(r.rev-bestRev)<0.001).sort((a,b2)=>a.same-b2.same);
  gc('c-alpha-path').setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    grid:{top:10,bottom:28,left:46,right:10},
    xAxis:{type:'category',data:apPath.map(r=>r.same+'%'),axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{scale:true,splitLine:{lineStyle:{color:'#21262d'}},
      axisLabel:{color:'#8b949e',fontSize:9,formatter:v=>v+'%'}},
    series:[
      {name:'α(SAME,REV='+bestRev+'%)',type:'line',smooth:true,symbol:'circle',symbolSize:5,
        data:apPath.map(r=>round2(r.alpha)),
        lineStyle:{color:'#58a6ff',width:2},
        itemStyle:{color(p){
          const same=apPath[p.dataIndex].same;
          return Math.abs(same-b.same)<0.001?'#ffa657':'#58a6ff';
        }},
        markLine:{data:[{yAxis:0,lineStyle:{color:'#555',type:'dashed'}}]}},
      {name:'BNH参考线',type:'line',data:apPath.map(()=>0),
        lineStyle:{color:'rgba(0,0,0,0)'},symbol:'none'},
    ]
  },true);

  // top10 table
  $('top10-body').innerHTML = d.top10.map((r,i)=>{
    const isBest=Math.abs(r.same-b.same)<0.001&&Math.abs(r.rev-b.rev)<0.001;
    const ratio=(r.same/amp.mean*100).toFixed(0);
    return `<tr class="${isBest?'best-row':''}">
      <td>${isBest?'⭐':i+1}</td>
      <td><b>${r.same}%</b> <span class="m">(均值×${(r.same/amp.mean).toFixed(1)})</span></td>
      <td>${r.rev}%</td>
      <td class="${cc(r.alpha)}">${p2(r.alpha)}</td>
      <td class="${cc(r.total_r)}">${p2(r.total_r)}</td>
      <td class="b">${Math.round(r.n_trades)}</td>
      <td>${r.sharpe.toFixed(2)}</td>
      <td class="r">${r.mdd.toFixed(1)}%</td>
      <td>${r.long_pct}%</td>
      <td>${isBest?'<span class="badge bo">当前最优</span>':'<span class="badge bc">备选</span>'}</td>
    </tr>`;
  }).join('');
}

function round2(v){return Math.round(v*100)/100;}
function sel(n){ cur=n; renderSide(); renderMain(n); }
sel(cur);
window.addEventListener('resize',()=>Object.values(C).forEach(c=>c.resize()));
</script>
