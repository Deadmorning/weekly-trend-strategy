<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>双层趋势策略对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657;--teal:#39d353;
  --c-wts:#8b949e;--c-dts:#58a6ff;--c-sim:#ffa657;--c-bnh:#30363d;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:13px}
header{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
header h1{font-size:15px;font-weight:700}
.hdr-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.chip-wts{background:rgba(139,148,158,.2);color:var(--c-wts);border:1px solid rgba(139,148,158,.35)}
.chip-dts{background:rgba(88,166,255,.15);color:var(--c-dts);border:1px solid rgba(88,166,255,.3)}
.chip-sim{background:rgba(255,166,87,.15);color:var(--c-sim);border:1px solid rgba(255,166,87,.3)}
.chip-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.legend{display:flex;gap:10px;font-size:11px}
.li{display:flex;align-items:center;gap:4px}
.ld{width:20px;height:3px;border-radius:1px}

.layout{display:grid;grid-template-columns:255px 1fr;height:calc(100vh - 47px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.main{overflow-y:auto;display:flex;flex-direction:column}

/* sidebar */
.etf-card{padding:10px 13px;cursor:pointer;border-left:3px solid transparent;
  border-bottom:1px solid rgba(48,54,61,.4);transition:background .12s}
.etf-card:hover{background:var(--bg3)}
.etf-card.active{background:var(--bg3);border-left-color:var(--blue)}
.ec-name{font-weight:700;font-size:12px;margin-bottom:4px}
.ec-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;font-size:10px}
.ec-item{background:var(--bg3);border-radius:3px;padding:2px 4px;text-align:center}
.ec-label{color:var(--text2);font-size:9px}
.ec-val{font-weight:700;font-size:11px}
.best-chip{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px}

/* tabs */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;padding:0 14px}
.tab{padding:9px 13px;font-size:12px;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;transition:.12s;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.pane{display:none;flex:1;flex-direction:column}
.pane.show{display:flex}

/* kpi strip */
.kpi-strip{display:flex;gap:6px;padding:10px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.kpi{flex:1;min-width:95px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:8px 12px}
.kl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.kv{font-size:17px;font-weight:700;margin-top:2px}
.ks{font-size:9px;color:var(--text2);margin-top:1px}

/* chart layout */
.ca{padding:10px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:11px}
.ct{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
#c-equity{width:100%;height:230px}
#c-daily{width:100%;height:280px}
#c-pos{width:100%;height:80px}
#c-vol{width:100%;height:70px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#c-alpha,#c-sharpe,#c-mdd{height:170px}
#c-ret,#c-longpct{height:170px}

/* overview */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:8px;padding:10px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px}
.ov-name{font-size:13px;font-weight:700;margin-bottom:8px}
.ov-strats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ov-strat{border-radius:5px;padding:7px 8px;border:1px solid var(--border)}
.ov-sl{font-size:9px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.ov-sv{font-size:14px;font-weight:700}
.ov-sa{font-size:10px;margin-top:1px}
.ov-sig{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.sig-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.sp-long{background:rgba(63,185,80,.2);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.sp-cash{background:rgba(139,148,158,.15);color:var(--text2);border:1px solid var(--border)}

/* trade table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--bg3);padding:6px 9px;text-align:left;color:var(--text2);
  font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
td{padding:6px 9px;border-bottom:1px solid rgba(48,54,61,.5)}
tr:hover td{background:var(--bg3)}

.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--yellow)}
.b{color:var(--blue)}.o{color:var(--orange)}.t2{color:var(--text2)}

/* signal status bar */
.sig-bar{display:flex;gap:8px;padding:8px 12px;
  background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.sb-item{display:flex;align-items:center;gap:5px}
.sb-label{color:var(--text2)}
.sb-val{font-weight:700;padding:1px 7px;border-radius:3px}
.sb-long{background:rgba(63,185,80,.2);color:var(--green)}
.sb-cash{background:rgba(139,148,158,.15);color:var(--text2)}
</style>
</head>
<body>

<header>
  <h1>双层趋势策略 &mdash; 三路对比</h1>
  <div class="hdr-right">
    <div class="legend">
      <div class="li"><div class="ld" style="background:var(--c-wts)"></div>纯WTS</div>
      <div class="li"><div class="ld" style="background:var(--c-dts)"></div>WTS+DTS</div>
      <div class="li"><div class="ld" style="background:var(--c-sim)"></div>WTS+简单</div>
      <div class="li"><div class="ld" style="background:var(--border);border:1px dashed var(--text2)"></div>BNH</div>
    </div>
    <span class="chip chip-wts">周线门控</span>
    <span class="chip chip-dts">+ DTS日线规则</span>
    <span class="chip chip-sim">+ 简单UP/DOWN</span>
    <span class="chip chip-gray">纯多头 · 空仓≠做空</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="tab('overview')">概览对比</div>
      <div class="tab" onclick="tab('chart')">图表分析</div>
      <div class="tab" onclick="tab('trades')">交易记录</div>
    </div>

    <div class="pane show" id="pane-overview">
      <div class="ov-grid" id="ov-grid"></div>
    </div>

    <div class="pane" id="pane-chart">
      <div class="sig-bar" id="sig-bar"></div>
      <div class="kpi-strip" id="kpi-strip"></div>
      <div class="ca">
        <div class="card">
          <div class="ct">累计收益曲线：三策略 vs 买入持有</div>
          <div id="c-equity"></div>
        </div>
        <div class="card">
          <div class="ct">日K线 + 三策略仓位</div>
          <div id="c-daily"></div>
        </div>
        <div class="card">
          <div class="ct">每日仓位状态（蓝=WTS+DTS 橙=WTS+简单 灰=纯WTS）</div>
          <div id="c-pos"></div>
        </div>
        <div class="three-col">
          <div class="card"><div class="ct">超额 α 对比</div><div id="c-alpha"></div></div>
          <div class="card"><div class="ct">夏普比率</div><div id="c-sharpe"></div></div>
          <div class="card"><div class="ct">最大回撤</div><div id="c-mdd"></div></div>
        </div>
        <div class="two-col">
          <div class="card"><div class="ct">策略收益 vs BNH</div><div id="c-ret"></div></div>
          <div class="card"><div class="ct">持多天占比 (%)</div><div id="c-longpct"></div></div>
        </div>
      </div>
    </div>

    <div class="pane" id="pane-trades">
      <div style="padding:10px">
        <div style="display:flex;gap:8px;margin-bottom:8px" id="trade-tabs">
          <button class="chip chip-wts active-trade" onclick="tradeSel('wts',this)" style="cursor:pointer;padding:4px 12px">纯 WTS</button>
          <button class="chip chip-dts" onclick="tradeSel('dts',this)" style="cursor:pointer;padding:4px 12px">WTS + DTS</button>
          <button class="chip chip-sim" onclick="tradeSel('sim',this)" style="cursor:pointer;padding:4px 12px">WTS + 简单</button>
        </div>
        <div class="card">
          <div class="ct" id="trade-title">交易记录</div>
          <div class="tbl-wrap" style="margin-top:7px">
            <table>
              <thead><tr>
                <th>入场日</th><th>出场日</th><th>入场价</th><th>出场价</th>
                <th>盈亏%</th><th>持仓天</th>
              </tr></thead>
              <tbody id="trade-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

const NAMES = Object.keys(D);
let cur = NAMES[0];
let curTradeMode = 'wts';
const charts = {};
const $ = id => document.getElementById(id);
const gc = id => { if(!charts[id]) charts[id]=echarts.init($(id),'dark'); return charts[id]; };
const pc = v => (v>=0?'+':'')+Number(v).toFixed(2)+'%';
const cc = v => v>0?'g':v<0?'r':'';

const STRATS = [
  {key:'wts', label:'纯WTS',   color:'#8b949e', col:'pos_wts'},
  {key:'dts', label:'WTS+DTS', color:'#58a6ff', col:'pos_wts_dts'},
  {key:'sim', label:'WTS+简单',color:'#ffa657', col:'pos_wts_sim'},
];

function bestStrat(st) {
  const alphas = {wts:st.wts_alpha, dts:st.dts_alpha, sim:st.sim_alpha};
  return Object.entries(alphas).sort((a,b)=>b[1]-a[1])[0][0];
}

// ── sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  $('sidebar').innerHTML = NAMES.map(n => {
    const st = D[n].status;
    const best = bestStrat(st);
    const bColors = {wts:'var(--c-wts)',dts:'var(--c-dts)',sim:'var(--c-sim)'};
    const bLabels = {wts:'WTS最优',dts:'DTS最优',sim:'简单最优'};
    return `<div class="etf-card ${n===cur?'active':''}" onclick="sel('${n}')">
      <div class="ec-name">${n}
        <span class="best-chip" style="background:rgba(88,166,255,.15);color:${bColors[best]}">${bLabels[best]}</span>
      </div>
      <div class="ec-row">
        ${STRATS.map(s=>{ const v=st[s.key+'_alpha']; return `<div class="ec-item">
          <div class="ec-label" style="color:${s.color}">${s.label}</div>
          <div class="ec-val ${cc(v)}">${pc(v)}</div>
        </div>`; }).join('')}
      </div>
      <div style="font-size:9px;color:var(--text2);margin-top:4px">BNH ${pc(st.bnh_ret)}</div>
    </div>`;
  }).join('');
}

// ── overview ────────────────────────────────────────────────────────────────
function renderOV() {
  $('ov-grid').innerHTML = NAMES.map(n => {
    const st = D[n].status;
    const best = bestStrat(st);
    const cards = STRATS.map(s => {
      const alpha = st[s.key+'_alpha'], ret = st[s.key+'_ret'];
      const isB = s.key===best;
      return `<div class="ov-strat" style="${isB?'border-color:'+s.color+';background:rgba(88,166,255,.04)':''}">
        <div class="ov-sl" style="color:${s.color}">${s.label}${isB?' ★':''}</div>
        <div class="ov-sv ${cc(alpha)}">${pc(alpha)}</div>
        <div class="ov-sa t2">收益 ${pc(ret)}</div>
      </div>`;
    }).join('');

    const posMap = {
      wts:  st.pos_wts,
      dts:  st.pos_wts_dts,
      sim:  st.pos_wts_sim,
    };
    const sigPills = STRATS.map(s => {
      const p=posMap[s.key];
      return `<span class="sig-pill ${p===1?'sp-long':'sp-cash'}" style="border-color:${s.color}">${s.label}:${p===1?'做多':'持现金'}</span>`;
    }).join('');

    return `<div class="ov-card">
      <div class="ov-name">${n} <span class="t2" style="font-size:10px;font-weight:400">${st.date} &nbsp;${st.close}</span></div>
      <div class="ov-strats">${cards}</div>
      <div class="ov-sig"><span class="t2" style="font-size:10px">当前信号:</span>${sigPills}</div>
    </div>`;
  }).join('');
}

    return `<div class="kpi" style="border-color:${s.color}20">
      <div class="kl" style="color:${s.color}">${s.label}</div>
      <div class="kv ${cc(alpha)}">${pc(alpha)}</div>
      <div class="ks">收益${pc(ret)} 夏普${sharpe} 回撤${mdd}% 持多${lp}%</div>
    </div>`;
  }).concat([`<div class="kpi">
    <div class="kl t2">买入持有</div>
    <div class="kv ${cc(st.bnh_ret)}">${pc(st.bnh_ret)}</div>
    <div class="ks">基准收益</div>
  </div>`]).join('');
}

// ── equity chart ───────────────────────────────────────────────────────────
function renderEquity(n) {
  const d = D[n];
  gc('c-equity').setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',formatter(ps){
      return ps.map(p=>`${p.marker}${p.seriesName}: ${Number(p.value)>=0?'+':''}${Number(p.value).toFixed(2)}%`).join('<br>');
    }},
    legend:{top:2,textStyle:{color:'#8b949e',fontSize:10}},
    grid:{top:28,bottom:26,left:52,right:50},
    xAxis:{type:'category',data:d.dates,axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{scale:true,splitLine:{lineStyle:{color:'#21262d'}},
      axisLabel:{color:'#8b949e',fontSize:9,formatter:v=>v+'%'}},
    series:[
      {name:'纯WTS',   type:'line',data:d.wts.cum_ret,smooth:true,symbol:'none',
        lineStyle:{color:'#8b949e',width:1.5}},
      {name:'WTS+DTS', type:'line',data:d.dts.cum_ret,smooth:true,symbol:'none',
        lineStyle:{color:'#58a6ff',width:2.5},
        areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,
          colorStops:[{offset:0,color:'rgba(88,166,255,.25)'},{offset:1,color:'rgba(88,166,255,.02)'}]}}},
      {name:'WTS+简单',type:'line',data:d.sim.cum_ret,smooth:true,symbol:'none',
        lineStyle:{color:'#ffa657',width:1.5}},
      {name:'BNH',     type:'line',data:d.wts.bnh_ret,smooth:true,symbol:'none',
        lineStyle:{color:'#30363d',width:1,type:'dashed'}},
    ]
  },true);
}

// ── daily K-line with position highlights ──────────────────────────────────
function renderDaily(n) {
  const d = D[n];
  const kdata = d.dates.map((_,i)=>[d.open[i],d.close[i],d.low[i],d.high[i]]);

  // 标记每种策略的持仓段（用markArea）
  function mkAreas(posArr, color) {
    const areas = [];
    let start = null;
    posArr.forEach((p,i)=>{
      if(p===1 && start===null) start=i;
      if(p!==1 && start!==null){ areas.push([{xAxis:d.dates[start]},{xAxis:d.dates[i-1]}]); start=null; }
    });
    if(start!==null) areas.push([{xAxis:d.dates[start]},{xAxis:d.dates[d.dates.length-1]}]);
    return areas.map(a=>[{...a[0],itemStyle:{color:color}},a[1]]);
  }

  gc('c-daily').setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
    legend:{top:2,textStyle:{color:'#8b949e',fontSize:9}},
    grid:{top:28,bottom:26,left:55,right:50},
    xAxis:{type:'category',data:d.dates,axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{scale:true,splitLine:{lineStyle:{color:'#21262d'}},
      axisLabel:{color:'#8b949e',fontSize:9}},
    series:[{
      name:'K线',type:'candlestick',data:kdata,
      itemStyle:{color:'#3fb950',color0:'#f85149',borderColor:'#3fb950',borderColor0:'#f85149'},
      markArea:{silent:true,data:[
        ...mkAreas(d.pos_wts_dts,'rgba(88,166,255,.12)'),
      ]}
    }]
  },true);
}

// ── position heatmap ───────────────────────────────────────────────────────
function renderPos(n) {
  const d = D[n];
  // 3行 x N列 的持仓热力图
  const rowData = [d.pos_wts, d.pos_wts_dts, d.pos_wts_sim];
  const rowNames = ['纯WTS','WTS+DTS','WTS+简单'];
  const colors = ['#8b949e','#58a6ff','#ffa657'];

  gc('c-pos').setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis'},
    grid:{top:4,bottom:24,left:55,right:10},
    xAxis:{type:'category',data:d.dates,axisLine:{lineStyle:{color:'#30363d'}},
      axisLabel:{show:false}},
    yAxis:{type:'category',data:rowNames,axisLabel:{color:'#8b949e',fontSize:9}},
    visualMap:{show:false,min:0,max:1},
    series: rowData.map((row,ri)=>({
      name: rowNames[ri],
      type:'heatmap',
      data: row.map((v,ci)=>[ci,ri,v]),
      itemStyle:{color(p){ return p.data[2]===1?colors[ri]:'#21262d'; }, borderColor:'#0d1117',borderWidth:1}
    }))
  },true);
}

// ── cross-ETF bar charts ────────────────────────────────────────────────────
function renderBars() {
  const sn = NAMES.map(n=>n.replace('ETF',''));
  const alphas = STRATS.map(s=>NAMES.map(n=>D[n].status[s.key+'_alpha']));
  const sharpes= STRATS.map(s=>NAMES.map(n=>D[n].status[s.key+'_sharpe']));
  const mdds   = STRATS.map(s=>NAMES.map(n=>D[n].status[s.key+'_mdd']));
  const rets   = STRATS.map(s=>NAMES.map(n=>D[n].status[s.key+'_ret']));
  const lps    = STRATS.map(s=>NAMES.map(n=>D[n].status[s.key+'_long_pct']));
  const bnhs   = NAMES.map(n=>D[n].status.bnh_ret);

  function makeSeries(dataArr, opts={}) {
    return STRATS.map((s,si)=>({
      name:s.label, type:'bar', data:dataArr[si], barMaxWidth:14,
      itemStyle:{color:s.color}, ...opts
    }));
  }

  const axOpts = (vFmt='%') => ({
    backgroundColor:'transparent', tooltip:{},
    legend:{bottom:0,textStyle:{color:'#8b949e',fontSize:9}},
    grid:{top:6,bottom:34,left:38,right:8},
    xAxis:{type:'category',data:sn,axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{splitLine:{lineStyle:{color:'#21262d'}},
      axisLabel:{color:'#8b949e',fontSize:9,formatter:v=>v+(vFmt||'')}},
  });

  gc('c-alpha').setOption({...axOpts('%'),
    series: makeSeries(alphas)}, true);

  gc('c-sharpe').setOption({...axOpts(''),
    series: makeSeries(sharpes)}, true);

  gc('c-mdd').setOption({...axOpts('%'),
    series: [{name:'纯WTS',type:'bar',data:mdds[0],barMaxWidth:14,itemStyle:{color:'#8b949e'}},
      {name:'WTS+DTS',type:'bar',data:mdds[1],barMaxWidth:14,itemStyle:{color:'#58a6ff'}},
      {name:'WTS+简单',type:'bar',data:mdds[2],barMaxWidth:14,itemStyle:{color:'#ffa657'}}]
  },true);

  gc('c-ret').setOption({
    backgroundColor:'transparent',tooltip:{},
    legend:{bottom:0,textStyle:{color:'#8b949e',fontSize:9}},
    grid:{top:6,bottom:34,left:38,right:8},
    xAxis:{type:'category',data:sn,axisLabel:{color:'#8b949e',fontSize:9}},
    yAxis:{splitLine:{lineStyle:{color:'#21262d'}},
      axisLabel:{color:'#8b949e',fontSize:9,formatter:v=>v+'%'}},
    series:[
      ...makeSeries(rets),
      {name:'BNH',type:'line',data:bnhs,symbol:'circle',symbolSize:5,
        lineStyle:{color:'#f85149',width:1.5,type:'dashed'},itemStyle:{color:'#f85149'}},
    ]
  },true);

  gc('c-longpct').setOption({...axOpts('%'),
    series: makeSeries(lps)}, true);
}

// ── trades ─────────────────────────────────────────────────────────────────
let activeTradeBtn = null;
function tradeSel(mode, btn) {
  curTradeMode = mode;
  if(activeTradeBtn) activeTradeBtn.style.opacity='0.5';
  btn.style.opacity='1';
  activeTradeBtn = btn;
  renderTrades(cur);
}
function renderTrades(n) {
  const ts = D[n][curTradeMode].trades;
  const m  = D[n][curTradeMode].metrics;
  const labels = {wts:'纯WTS',dts:'WTS+DTS',sim:'WTS+简单'};
  $('trade-title').textContent = `${n}  ${labels[curTradeMode]}  交易记录 (${ts.length}笔)  `+
    `总收益${pc(m.total_return)} 超额α${pc(m.alpha)} 夏普${m.sharpe}`;
  $('trade-body').innerHTML = ts.map(t=>{
    const p=t.pnl_pct!=null?`<span class="${t.pnl_pct>=0?'g':'r'}">${t.pnl_pct>=0?'+':''}${t.pnl_pct}%</span>`:'--';
    return `<tr>
      <td>${t.entry_date}</td><td>${t.exit_date}</td>
      <td>${t.entry_price}</td><td>${t.exit_price}</td>
      <td>${p}</td><td class="b">${t.hold_days}天</td>
    </tr>`;
  }).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:16px">暂无交易</td></tr>';
}

// ── main ────────────────────────────────────────────────────────────────────
function sel(n) {
  cur = n;
  renderSidebar();
  renderSigBar(n);
  renderKPI(n);
  renderEquity(n);
  renderDaily(n);
  renderPos(n);
  renderBars();
  renderTrades(n);
}

const PANES = ['overview','chart','trades'];
function tab(id) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',PANES[i]===id));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('show'));
  $('pane-'+id).classList.add('show');
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()),50);
}

// init trade btn
setTimeout(()=>{
  const btn=document.querySelector('#trade-tabs button');
  if(btn){activeTradeBtn=btn;btn.style.opacity='1';}
},0);

renderSidebar();
renderOV();
sel(cur);
window.addEventListener('resize',()=>Object.values(charts).forEach(c=>c.resize()));
</script>
